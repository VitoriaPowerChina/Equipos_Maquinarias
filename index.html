<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Equipos y Maquinaria — La Pampina DPR</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css?v=4.1">
</head>
<body>

<!-- ── TOPBAR ─────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">PowerChina</span>
    <span class="topbar-sep">|</span>
    <span class="topbar-title">Equipos y Maquinaria Disponible — La Pampina</span>
  </div>
  <div class="topbar-right">
    <span id="statusChip" class="status-chip" style="display:none"></span>
    <button class="btn-icon" id="themeBtn" title="Alternar tema" onclick="toggleTheme()">
      <i class="bi bi-moon-fill"></i>
    </button>
  </div>
</header>

<div id="app">

  <!-- KPI bar -->
  <div class="kpi-bar">
    <div class="kpi-card">
      <i class="bi bi-files"></i>
      <div><span id="kDprs">—</span><small>DPRs cargados</small></div>
    </div>
    <div class="kpi-card">
      <i class="bi bi-calendar-range"></i>
      <div><span id="kRange">—</span><small>Rango de fechas</small></div>
    </div>
    <div class="kpi-card">
      <i class="bi bi-truck"></i>
      <div><span id="kEquip">—</span><small>Registros de equipos</small></div>
    </div>
    <div class="kpi-card kpi-ok">
      <i class="bi bi-check-circle"></i>
      <div><span id="kDisp">—</span><small>Total disponibles</small></div>
    </div>
    <div class="kpi-card kpi-warn">
      <i class="bi bi-hourglass-split"></i>
      <div><span id="kStby">—</span><small>Total stand by</small></div>
    </div>
    <div class="kpi-card kpi-err">
      <i class="bi bi-exclamation-triangle"></i>
      <div><span id="kAver">—</span><small>Total averías</small></div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label><i class="bi bi-calendar3"></i> De</label>
      <input type="date" id="fDateFrom" onchange="applyFilters()">
    </div>
    <div class="filter-group">
      <label><i class="bi bi-calendar3"></i> Hasta</label>
      <input type="date" id="fDateTo" onchange="applyFilters()">
    </div>
    <div class="filter-group">
      <label><i class="bi bi-building"></i> Empresa</label>
      <select id="fEmpresa" onchange="applyFilters()">
        <option value="">Todas</option>
      </select>
    </div>
    <div class="filter-group">
      <label><i class="bi bi-truck"></i> Equipo</label>
      <select id="fEquipo" onchange="applyFilters()">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="filter-group">
      <label><i class="bi bi-eye"></i> Mostrar</label>
      <select id="fMostrar" onchange="applyFilters()">
        <option value="todos">Todos</option>
        <option value="disponible">Disponible</option>
        <option value="standby">Stand by</option>
        <option value="averia">Avería</option>
      </select>
    </div>
    <div class="filter-group">
      <label><i class="bi bi-search"></i> Buscar</label>
      <input type="search" id="fSearch" placeholder="empresa, equipo…" oninput="applyFilters()">
    </div>
    <button class="btn-clear" onclick="clearFilters()">
      <i class="bi bi-x-circle"></i> Limpiar
    </button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <span id="rowCount" class="row-count"></span>
    <div class="toolbar-right">
      <button class="btn-toggle-all" onclick="expandAll()"   title="Expandir todas las empresas"><i class="bi bi-arrows-expand"></i> Expandir</button>
      <button class="btn-toggle-all" onclick="collapseAll()" title="Colapsar todas las empresas"><i class="bi bi-arrows-collapse"></i> Colapsar</button>
      <button class="btn-add-more" onclick="document.getElementById('fileMore').click()">
        <i class="bi bi-plus-circle"></i> Agregar DPRs
      </button>
      <input type="file" id="fileMore" multiple accept=".xlsx,.xls,.xlsm"
             onchange="loadFiles(this.files)" style="display:none">
      <button class="btn-export" onclick="exportExcel()">
        <i class="bi bi-file-earmark-excel"></i> Exportar Excel
      </button>
    </div>
  </div>

  <!-- Loaded files pills -->
  <div id="filesPanel" class="files-panel" style="display:none">
    <span class="files-label"><i class="bi bi-calendar-week"></i> Dias carregados:</span>
    <div id="filePills" class="file-pills-wrap"></div>
  </div>

  <!-- Pivot table -->
  <div class="table-wrap" id="tableWrap">
    <table id="mainTable">
      <thead id="pivotHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyMsg" class="empty-msg">
      <i class="bi bi-file-earmark-spreadsheet"></i><br>
      <span id="emptyText">Haz clic en <strong>Agregar DPRs</strong> para cargar archivos</span>
    </div>
  </div>

</div><!-- /app -->

<div id="toast" class="toast" style="display:none"></div>
<script src="app.js?v=4.2"></script>
</body>
</html>
